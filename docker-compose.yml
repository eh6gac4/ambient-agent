version: "3.9"

services:
  agent:
    build: .
    container_name: ambient-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data          # token.json などの永続化
      - ./prompts:/app/prompts
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
